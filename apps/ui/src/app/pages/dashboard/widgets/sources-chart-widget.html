<div class="rounded-border border border-surface bg-surface-card">
  <div class="p-4 border-b border-surface">
    <h3 class="font-bold text-lg m-0">Chunks by Source</h3>
  </div>
  <div class="p-4">
    @if (loading()) {
      <div class="flex justify-center p-4"><i class="pi pi-spin pi-spinner text-2xl"></i></div>
    } @else if (empty()) {
      <p class="text-muted-color m-0">No sources configured.</p>
    } @else {
      <div class="w-full" style="height: 250px">
        <canvas #chartCanvas></canvas>
      </div>
    }
  </div>
</div>
