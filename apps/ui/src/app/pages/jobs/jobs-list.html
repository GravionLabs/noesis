<div
  class="grid grid-rows-[auto_1fr] gap-4 p-4"
  style="height: calc(100vh - var(--helix-topbar-height) - var(--helix-status-bar-height) - (var(--helix-layout-gap) * 2))"
>
  <p-toolbar>
    <ng-template #start>
      <div class="flex items-center gap-4">
        <b>Jobs</b>
        <div class="flex gap-2">
          <p-button label="All" size="small" [outlined]="statusFilter() !== 'all'" (onClick)="setFilter('all')" />
          <p-button label="Pending" size="small" [outlined]="statusFilter() !== 'pending'" (onClick)="setFilter('pending')" />
          <p-button label="Running" size="small" [outlined]="statusFilter() !== 'running'" (onClick)="setFilter('running')" />
          <p-button label="Done" size="small" [outlined]="statusFilter() !== 'done'" (onClick)="setFilter('done')" />
          <p-button label="Failed" size="small" [outlined]="statusFilter() !== 'failed'" (onClick)="setFilter('failed')" />
          <p-button label="Cancelled" size="small" [outlined]="statusFilter() !== 'cancelled'" (onClick)="setFilter('cancelled')" />
        </div>
      </div>
    </ng-template>
  </p-toolbar>

  <div class="min-h-0 border border-surface rounded-border ag-theme-quartz">
    <ag-grid-angular
      [rowData]="filteredJobs()"
      [columnDefs]="colDefs"
      [defaultColDef]="defaultColDef"
      [context]="context"
      [loading]="store.loading()"
      [overlayNoRowsTemplate]="'No jobs found.'"
      style="height: 100%; width: 100%;"
    />
  </div>
</div>
