<div
  class="grid grid-rows-[auto_1fr] gap-4 p-4"
  style="height: calc(100vh - var(--helix-topbar-height) - var(--helix-status-bar-height) - (var(--helix-layout-gap) * 2))"
>
  <p-toolbar>
    <ng-template #start>
      <div class="flex items-center gap-4">
        <b>Sources</b>
        <p-iconfield>
          <p-inputicon class="pi pi-search" />
          <input
            type="text"
            pInputText
            placeholder="Search sources..."
            (input)="onSearch($event)"
          />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template #end>
      <p-button label="Add Source" icon="pi pi-plus" (onClick)="openCreate()" />
    </ng-template>
  </p-toolbar>

  <div class="overflow-auto min-h-0 border border-surface rounded-border">
    <p-table #dt [value]="store.sources()" [loading]="store.loading()" [globalFilterFields]="['name', 'url', 'importerType']" dataKey="id">
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>URL</th>
          <th>Importer Type</th>
          <th>Enabled</th>
          <th>Last Imported</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-source>
        <tr>
          <td>
            <a [routerLink]="['/sources', source.id]">{{ source.name }}</a>
          </td>
          <td>{{ source.url }}</td>
          <td><app-importer-type-badge [type]="source.importerType" /></td>
          <td>
            <p-toggleswitch
              [ngModel]="source.enabled"
              (onChange)="toggleEnabled(source, $event.checked)"
            />
          </td>
          <td>{{ source.lastImportedAt | datetime }}</td>
          <td class="flex gap-2 justify-end">
            <p-button icon="pi pi-sync" severity="secondary" text (onClick)="importNow(source)" pTooltip="Import Now" />
            <p-button icon="pi pi-pencil" severity="secondary" text (onClick)="openEdit(source)" pTooltip="Edit" />
            <p-button icon="pi pi-trash" severity="danger" text (onClick)="confirmDelete(source)" pTooltip="Delete" />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6">No sources configured yet.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<app-source-form-dialog
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [source]="editingSource()"
  (saved)="onSaved()"
/>
