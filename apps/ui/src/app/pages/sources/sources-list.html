<div
  class="grid grid-rows-[auto_1fr] gap-4 p-4"
  style="height: calc(100vh - var(--helix-topbar-height) - var(--helix-status-bar-height) - (var(--helix-layout-gap) * 2))"
>
  <p-toolbar>
    <ng-template #start>
      <div class="flex items-center gap-4">
        <b>Sources</b>
        <p-iconfield>
          <p-inputicon class="pi pi-search" />
          <input
            type="text"
            pInputText
            placeholder="Search sources..."
            (input)="onSearch($event)"
          />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template #end>
      <p-button label="Add Source" icon="pi pi-plus" (onClick)="openCreate()" />
    </ng-template>
  </p-toolbar>

  <div class="min-h-0 border border-surface rounded-border ag-theme-quartz">
    <ag-grid-angular
      [rowData]="store.sources()"
      [columnDefs]="colDefs"
      [defaultColDef]="defaultColDef"
      [context]="context"
      [loading]="store.loading()"
      [overlayNoRowsTemplate]="'No sources configured yet.'"
      (gridReady)="onGridReady($event)"
      style="height: 100%; width: 100%;"
    />
  </div>
</div>

<app-source-form-dialog
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [source]="editingSource()"
  (saved)="onSaved()"
/>
