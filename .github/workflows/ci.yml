name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "biome.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "apps/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "biome.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      force-publish:
        description: "Force Docker publish (skip branch check)"
        type: boolean
        default: false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        uses: GravionLabs/ci/versioning/determine-version@main

      - uses: GravionLabs/ci/node/ci@main
        with:
          package-manager: pnpm
          run-lint: true
          run-tests: true
          upload-results: false
          publish-results: false

      - name: Upload test results artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/server/test-results/junit.xml
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/server/coverage/
          if-no-files-found: warn

      - name: Publish test results
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: apps/server/test-results/junit.xml
          reporter: jest-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Publish coverage summary
        if: success()
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: apps/server/coverage/cobertura-coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          output: both

      - uses: GravionLabs/ci/docker/lint@main
        with:
          dockerfile: apps/server/Dockerfile

      - name: Publish Docker image
        if: false  # disabled — manual release for now
        uses: GravionLabs/ci/docker/publish@main
        with:
          image-name: ghcr.io/gravionlabs/noesis
          registry-username: ${{ github.actor }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}
          docker-version: ${{ steps.version.outputs.docker-version }}
          major: ${{ steps.version.outputs.major }}
          minor: ${{ steps.version.outputs.minor }}
          patch: ${{ steps.version.outputs.patch }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}.${{ steps.version.outputs.patch }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes

  ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular app
        run: pnpm --filter @noesis/ui build

      - name: Run Angular tests
        run: pnpm --filter @noesis/ui test

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: noesis_test
          POSTGRES_USER: noesis
          POSTGRES_PASSWORD: noesis_dev
        ports:
          - 5443:5432
        options: >-
          --health-cmd "pg_isready -U noesis -d noesis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://noesis:noesis_dev@localhost:5443/noesis_test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm --filter @noesis/server test:integration
