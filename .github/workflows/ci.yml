name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "crawler/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Dockerfile"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "crawler/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Dockerfile"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm test
      - run: pnpm typecheck

  docker:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t noesis-server .
