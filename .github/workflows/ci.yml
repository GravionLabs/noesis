name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Dockerfile"
      - "biome.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Dockerfile"
      - "biome.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      force-publish:
        description: "Force Docker publish (skip branch check)"
        type: boolean
        default: false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        uses: GravionLabs/ci/versioning/determine-version@main

      - uses: GravionLabs/ci/node/ci@main
        with:
          package-manager: pnpm
          run-lint: true
          run-tests: true

      - uses: GravionLabs/ci/docker/lint@main

      - name: Publish Docker image
        if: |
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && inputs.force-publish)
        uses: GravionLabs/ci/docker/publish@main
        with:
          image-name: ${{ github.repository }}
          registry-username: ${{ github.actor }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}
          docker-version: ${{ steps.version.outputs.docker-version }}
          major: ${{ steps.version.outputs.major }}
          minor: ${{ steps.version.outputs.minor }}
          patch: ${{ steps.version.outputs.patch }}
