name: noesis

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: noesis-postgres
    environment:
      POSTGRES_DB: noesis
      POSTGRES_USER: noesis
      POSTGRES_PASSWORD: noesis_dev
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U noesis -d noesis" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: pgvector/pgvector:pg18
    container_name: noesis-postgres-test
    environment:
      POSTGRES_DB: noesis_test
      POSTGRES_USER: noesis
      POSTGRES_PASSWORD: noesis_dev
    ports:
      - "5443:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U noesis -d noesis_test" ]
      interval: 5s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: noesis-seq
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:5341"
      - "5380:80"
    volumes:
      - seq_data:/data

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: noesis-server
    environment:
      DATABASE_URL: "postgres://noesis:noesis_dev@postgres:5432/noesis"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-local}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-Xenova/bge-base-en-v1.5}"
      LOG_SINK: "seq"
      SEQ_URL: "http://seq:5341"
      LOG_LEVEL: "debug"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started

volumes:
  postgres_data:
  seq_data:
