name: noesis

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: noesis-postgres
    environment:
      POSTGRES_DB: noesis
      POSTGRES_USER: noesis
      POSTGRES_PASSWORD: noesis_dev
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U noesis -d noesis" ]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: noesis-rabbitmq
    ports:
      - "5682:5672"
      - "15682:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - all

  crawler:
    build:
      context: ../crawler
      dockerfile: Dockerfile
    container_name: noesis-crawler
    environment:
      DATABASE_URL: "postgres://noesis:noesis_dev@postgres:5432/noesis"
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: noesis-server
    environment:
      DATABASE_URL: "postgres://noesis:noesis_dev@postgres:5432/noesis"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-local}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-Xenova/bge-base-en-v1.5}"
      CRAWLER_URL: "http://crawler:3001"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
