name: noesis

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: noesis-postgres
    environment:
      POSTGRES_DB: noesis
      POSTGRES_USER: noesis
      POSTGRES_PASSWORD: noesis_dev
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U noesis -d noesis" ]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: noesis-rabbitmq
    ports:
      - "5682:5672"
      - "15682:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ef-migrate:
    build:
      context: ../server
      dockerfile: src/Gravion.Noesis.Migrator/Dockerfile
    container_name: noesis-ef-migrate
    restart: "no"
    environment:
      CONNECTIONSTRINGS__NOESIS: "Host=postgres;Port=5432;Database=noesis;Username=noesis;Password=noesis_dev"
    depends_on:
      postgres:
        condition: service_healthy

  crawler:
    build:
      context: ../crawler
      dockerfile: Dockerfile
    container_name: noesis-crawler
    environment:
      DATABASE_URL: "postgres://noesis:noesis_dev@postgres:5432/noesis"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  embedder:
    build:
      context: ../embedder
      dockerfile: Dockerfile
    container_name: noesis-embedder
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "postgresql://noesis:noesis_dev@postgres:5432/noesis"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      SERVER_URL: "${SERVER_URL:-http://host.docker.internal:5000}"
      # Provider options: openai | ollama | huggingface
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-huggingface}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-BAAI/bge-large-en-v1.5}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      # HuggingFace model cache — avoids re-downloading on container restart
      HF_HOME: "/app/.hf_cache"
    volumes:
      - hf_model_cache:/app/.hf_cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mcp-inspector:
    image: node:22-alpine
    container_name: noesis-mcp-inspector
    working_dir: /app
    command:
      - sh
      - -lc
      - >
        npx -y @modelcontextprotocol/inspector@0.21.2
        --transport http
        --server-url ${MCP_SERVER_URL:-http://host.docker.internal:5000/mcp}
    environment:
      HOST: "0.0.0.0"
      CLIENT_PORT: "6274"
      SERVER_PORT: "6277"
      MCP_AUTO_OPEN_ENABLED: "false"
      DANGEROUSLY_OMIT_AUTH: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "6274:6274"
      - "6277:6277"

volumes:
  postgres_data:
  hf_model_cache:
